<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ES">
  <style>
    /* Día: fondo blanco, letra negra. */
    rect { fill: #fafafa; }
    text { fill: #0a0a0a; }
    /* Noche: fondo negro, letra blanca. */
    @media (prefers-color-scheme: dark) {
      rect { fill: #0a0a0a; }
      text { fill: #fafafa; }
    }
  </style>
  <rect width="32" height="32" rx="8" />
  <text
    x="16"
    y="16"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Space Mono', ui-monospace, monospace"
    font-size="14"
    font-weight="700"
    letter-spacing="-0.5"
  >ES</text>
</svg>
